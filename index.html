<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Cash Flow Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #fdf5f7;
            --text-main: #1a1f36;
            --text-muted: #8792a2;
            --white: #ffffff;
            --green: #22c55e;
            --red: #ef4444;
            --border: #e5e7eb;
            --pink-card: linear-gradient(135deg, #ff84c4, #ff61b2);
            --red-card: linear-gradient(135deg, #ff8896, #ff6473);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 40px 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* Header */
        header {
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #111827;
        }

        header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* Top Cards */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .card {
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-pink {
            background: var(--pink-card);
            color: var(--white);
        }

        .card-red {
            background: var(--red-card);
            color: var(--white);
        }

        .card-white {
            background: var(--white);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 15px;
            opacity: 0.9;
        }

        .card-amount {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .card-subtitle {
            font-size: 12px;
            opacity: 0.8;
        }

        /* Summary Card Details */
        .summary-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .summary-row.net {
            border-top: 1px solid var(--border);
            padding-top: 12px;
            margin-top: 4px;
            margin-bottom: 0;
            font-weight: 600;
        }

        .text-green { color: var(--green); }
        .text-red { color: var(--red); }
        .text-gray { color: var(--text-muted); }

        .icon-circle {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 1px solid;
            font-size: 10px;
            margin-right: 8px;
        }

        .icon-circle.green { border-color: var(--green); color: var(--green); }
        .icon-circle.red { border-color: var(--red); color: var(--red); }

        /* Main Content (Bottom Row) */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }

        .panel {
            background: var(--white);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
        }

        .panel-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        /* Form Elements */
        .type-toggle {
            display: flex;
            background: #f3f4f6;
            border-radius: 8px;
            padding: 4px;
            margin-bottom: 20px;
        }

        .toggle-btn {
            flex: 1;
            padding: 10px;
            text-align: center;
            border: none;
            background: transparent;
            font-size: 14px;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.3s;
        }

        .toggle-btn.active.expense {
            background: var(--red);
            color: var(--white);
            box-shadow: 0 2px 4px rgba(239, 68, 68, 0.3);
        }

        .toggle-btn.active.income {
            background: var(--green);
            color: var(--white);
            box-shadow: 0 2px 4px rgba(34, 197, 94, 0.3);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .form-control {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-control:focus {
            border-color: #a78bfa;
        }

        /* Transactions Header */
        .transactions-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .date-picker {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 13px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
            background: #fff;
            cursor: pointer;
        }

        .empty-state {
            text-align: center;
            padding: 60px 0;
            color: var(--text-muted);
        }

        .empty-state p:first-child {
            color: var(--text-main);
            font-weight: 500;
            margin-bottom: 8px;
        }

        .empty-state p:last-child {
            font-size: 14px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            .cards-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Daily Cash Flow</h1>
        <p>Track your income and expenses</p>
    </header>

    <div class="cards-grid">
        <div class="card card-pink">
            <div>
                <div class="card-header">
                    <i class="fa-solid fa-wallet"></i> Total Balance
                </div>
                <div class="card-amount">$0.00</div>
            </div>
            <div class="card-subtitle">Positive balance</div>
        </div>

        <div class="card card-red">
            <div>
                <div class="card-header">
                    <i class="fa-regular fa-calendar"></i> Today's Balance
                </div>
                <div class="card-amount">$0.00</div>
            </div>
            <div class="card-subtitle">Positive balance</div>
        </div>

        <div class="card card-white">
            <div class="summary-title">Today's Summary</div>
            
            <div class="summary-row">
                <div class="text-gray">
                    <span class="icon-circle green"><i class="fa-solid fa-arrow-up"></i></span> Income
                </div>
                <div class="text-green font-semibold">$0.00</div>
            </div>
            
            <div class="summary-row">
                <div class="text-gray">
                    <span class="icon-circle red"><i class="fa-solid fa-arrow-down"></i></span> Expenses
                </div>
                <div class="text-red font-semibold">$0.00</div>
            </div>
            
            <div class="summary-row net">
                <div>Net</div>
                <div class="text-green">$0.00</div>
            </div>
        </div>
    </div>

    <div class="main-grid">
        <div class="panel">
            <h2 class="panel-title">Add Transaction</h2>
            
            <div class="form-group">
                <label>Type</label>
                <div class="type-toggle">
                    <button class="toggle-btn" id="btn-income" onclick="setType('income')">Income</button>
                    <button class="toggle-btn active expense" id="btn-expense" onclick="setType('expense')">Expense</button>
                </div>
            </div>

            <div class="form-group">
                <label>Amount</label>
                <input type="text" class="form-control" placeholder="0.00">
            </div>

            <div class="form-group">
                <label>Category</label>
                <select class="form-control" style="color: #8792a2;">
                    <option value="" disabled selected>Select category...</option>
                    <option value="food">Food & Dining</option>
                    <option value="transport">Transportation</option>
                    <option value="salary">Salary</option>
                </select>
            </div>
        </div>

        <div class="panel">
            <div class="transactions-header">
                <h2 class="panel-title" style="margin-bottom: 0;">Transactions</h2>
                <div class="date-picker">
                    <i class="fa-regular fa-calendar"></i> dd/mm/yyyy
                </div>
            </div>

            <div class="empty-state">
                <p>No transactions yet</p>
                <p>Add your first transaction to get started</p>
            </div>
        </div>
    </div>
</div>

<script>
    // Script sederhana untuk menganimasikan tombol toggle Income / Expense
    function setType(type) {
        const btnIncome = document.getElementById('btn-income');
        const btnExpense = document.getElementById('btn-expense');

        // Reset class
        btnIncome.className = 'toggle-btn';
        btnExpense.className = 'toggle-btn';

        if(type === 'income') {
            btnIncome.classList.add('active', 'income');
        } else {
            btnExpense.classList.add('active', 'expense');
        }
    }
</script>

</body>
</html>
